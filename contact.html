<!DOCTYPE html>
<html>
    <head>
        <title>Contact</title>
        <link rel="stylesheet" href="css/cstyle.css">
    </head>
	
    <body>
        <div class="contact">
            <h1>Contact</h1>
            <div class="border"></div>
            <form class="cform">
                <input type="text" class="cftext" placeholder="Your name">
                <input type="email" class="cftext" placeholder="Your email">
                <input type="text" class="cftext" placeholder="Your phone">
                <textarea class="cftext area" placeholder="Your message"></textarea>
                <input type="submit" class="cfbutton">
            </form>
        </div>
    </body>
</html>
